<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:sans-serif;
overflow:hidden;
color:white;
}

h1{
margin-bottom:40px;
}

.heart{
position:relative;
width:100px;
height:90px;
animation:beat 1s infinite;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
top:0;
width:52px;
height:80px;
background:red;
border-radius:50px 50px 0 0;
}

.heart:before{
left:50px;
transform:rotate(-45deg);
transform-origin:0 100%;
}

.heart:after{
left:0;
transform:rotate(45deg);
transform-origin:100% 100%;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.message{
margin-top:40px;
font-size:20px;
text-align:center;
}

.flying-heart{
position:absolute;
color:red;
font-size:20px;
animation:fly 5s linear infinite;
}

@keyframes fly{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>

<body>

<h1>💖 Chúc Mừng 8/3 💖</h1>

<div class="heart"></div>

<div class="message">
Chúc bé Dịu Ái luôn xinh đẹp, dịu dàng  
và luôn được yêu thương thật nhiều ❤️
</div>

<script>

function createHeart(){

const heart=document.createElement("div");

heart.className="flying-heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(10+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000)

}

setInterval(createHeart,300)

</script>

</body>
</html>
